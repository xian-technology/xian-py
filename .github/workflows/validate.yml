name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xian-py
        uses: actions/checkout@v6
        with:
          path: xian-py

      - name: Checkout xian-contracting
        uses: actions/checkout@v6
        with:
          repository: xian-technology/xian-contracting
          ref: main
          path: xian-contracting

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        working-directory: xian-py
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: xian-py
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: xian-py
        run: uv run ruff format --check .

      - name: Run tests with coverage
        working-directory: xian-py
        run: uv run pytest --cov=xian_py --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xian-py-coverage
          path: xian-py/coverage.xml
